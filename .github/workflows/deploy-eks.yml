name: Deploy – AWS EKS

on:
  push:
    branches: [main]

env:
  AWS_REGION:     us-east-1
  EKS_CLUSTER:    loanflow-eks
  ECR_REGISTRY:   ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push images to ECR
        run: |
          SERVICES="api-gateway customer-service loan-service credit-service disbursement-service payment-service notification-service mock-bank-service frontend-web"
          for svc in $SERVICES; do
            echo "🐳 Building $svc"
            docker build -t $ECR_REGISTRY/$svc:${{ github.sha }} ./$svc
            docker push $ECR_REGISTRY/$svc:${{ github.sha }}
            docker tag $ECR_REGISTRY/$svc:${{ github.sha }} $ECR_REGISTRY/$svc:latest
            docker push $ECR_REGISTRY/$svc:latest
          done

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Deploy to EKS
        run: |
          kubectl apply -f infrastructure/kubernetes/namespaces.yaml
          kubectl apply -f infrastructure/kubernetes/configmaps/
          kubectl apply -f infrastructure/kubernetes/deployments/
          kubectl apply -f infrastructure/kubernetes/services/
          kubectl apply -f infrastructure/kubernetes/hpa/
          kubectl apply -f infrastructure/kubernetes/ingress/

          # Update images with new SHA
          SERVICES="api-gateway customer-service loan-service credit-service disbursement-service payment-service notification-service mock-bank-service frontend-web"
          for svc in $SERVICES; do
            kubectl set image deployment/$svc $svc=$ECR_REGISTRY/$svc:${{ github.sha }} -n loanflow
          done

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/api-gateway    -n loanflow
          kubectl rollout status deployment/loan-service   -n loanflow
          kubectl rollout status deployment/frontend-web   -n loanflow
