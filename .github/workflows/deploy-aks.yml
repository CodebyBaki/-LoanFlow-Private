name: Deploy – Azure AKS

on:
  push:
    branches: [main]

env:
  AZURE_RESOURCE_GROUP: loanflow-rg
  AKS_CLUSTER:          loanflow-aks
  ACR_REGISTRY:         loanflowacr06658.azurecr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name loanflowacr06658

      - name: Build, tag and push images to ACR
        run: |
          SERVICES="api-gateway customer-service loan-service credit-service disbursement-service payment-service notification-service mock-bank-service frontend-web"
          for svc in $SERVICES; do
            echo "🐳 Building $svc"
            docker build -t $ACR_REGISTRY/$svc:${{ github.sha }} ./$svc
            docker push $ACR_REGISTRY/$svc:${{ github.sha }}
            docker tag $ACR_REGISTRY/$svc:${{ github.sha }} $ACR_REGISTRY/$svc:latest
            docker push $ACR_REGISTRY/$svc:latest
          done

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          cluster-name:   ${{ env.AKS_CLUSTER }}

      - name: Deploy to AKS
        run: |
          kubectl apply -f infrastructure/kubernetes/namespaces.yaml
          kubectl apply -f infrastructure/kubernetes/configmaps/secrets.yaml
          kubectl apply -f infrastructure/kubernetes/deployments/postgres.yaml

      - name: Apply Kubernetes manifests
        run: |
          find . -path "*/k8s/*.yaml" -type f | sort | while read file; do
            echo "Applying $file"
            kubectl apply -f "$file"
          done
      - name: Update images with new SHA
        run: |
          # Update images with new SHA
          SERVICES="api-gateway customer-service loan-service credit-service disbursement-service payment-service notification-service mock-bank-service frontend-web"
          for svc in $SERVICES; do
            kubectl set image deployment/$svc $svc=$ACR_REGISTRY/$svc:${{ github.sha }} -n loanflow
          done

      - name: Verify rollout
        run: |
          # Verify rollout status
          SERVICES="api-gateway customer-service loan-service credit-service disbursement-service payment-service notification-service mock-bank-service frontend-web"
          for svc in $SERVICES; do
            kubectl rollout status deployment/$svc -n loanflow
          done
