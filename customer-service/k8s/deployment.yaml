apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: loanflow
  labels:
    app: customer-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
        - name: customer-service
          image: loanflowacr06658.azurecr.io/loanflow/customer-service:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: loanflow-secrets
                  key: jwt-secret
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: loanflow-secrets
                  key: db-host
            - name: DB_NAME
              value: "loanflow"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: loanflow-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: loanflow-secrets
                  key: db-password
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
  namespace: loanflow
spec:
  selector:
    app: customer-service
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
